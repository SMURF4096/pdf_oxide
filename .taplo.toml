# taplo TOML formatter configuration
# https://taplo.tamasfe.dev/configuration/file.html

include = [
    "Cargo.toml",
    "pdf_oxide_cli/Cargo.toml",
    "pdf_oxide_mcp/Cargo.toml",
    "deny.toml",
    "rust-toolchain.toml",
    "pyproject.toml",
    ".taplo.toml",
]

exclude = [
    # Vendored fixtures / downloaded sub-repos — not ours to format
    "tools/benchmark-harness/.fixture-src/**",
    "tools/benchmark-harness/fixtures/**",
    "target/**",
    "**/node_modules/**",
    ".venv/**",
    "dist/**",
]

[formatting]
column_width = 100
indent_string = "    "
reorder_keys = false
trailing_newline = true
align_entries = false
