# Security audit configuration
# See: https://rustsec.org/

[advisories]
# Advisories to ignore (with justification)
ignore = [
    # RUSTSEC-2023-0071: rsa timing sidechannel (Marvin Attack)
    # - No fixed version available upstream
    # - Our usage is for PDF signature verification, not RSA decryption
    # - Timing attacks require local access and precise measurements
    # - Will update when fix becomes available
    "RUSTSEC-2023-0071",
    # RUSTSEC-2026-0176 / RUSTSEC-2026-0177: pyo3 0.28.x advisories — an
    # out-of-bounds read in `nth`/`nth_back` for PyList/PyTuple iterators, and
    # a missing `Sync` bound on `PyCFunction::new_closure` closures. Neither
    # API is used by our binding (lists are built via `PyList::empty`+`append`;
    # all callables are `#[pyfunction]`/`#[pymethods]`, never runtime closures),
    # so both paths are unreachable. Fixed in pyo3 0.29.0, but not yet adoptable:
    # pyo3-log (latest 0.13.3) requires pyo3 `>=0.26, <0.29`, so taking 0.29 would
    # drop the Rust->Python logging bridge. Bump pyo3 + pyo3-log together once
    # pyo3-log supports 0.29 (review 2026-09-10).
    "RUSTSEC-2026-0176",
    "RUSTSEC-2026-0177",
    # RUSTSEC-2026-0194 / RUSTSEC-2026-0195: quick-xml < 0.41 — quadratic-time
    # duplicate-attribute check and unbounded NsReader namespace allocation, both
    # denial-of-service only (no memory-safety/RCE). Fixed in quick-xml 0.41.0,
    # which is already our direct dependency; the only affected instance is
    # quick-xml 0.40.1 pulled transitively by office_oxide 0.1.2 (Office-document
    # conversion), which is the latest 0.1.x and cannot move to 0.41 until
    # office_oxide releases against it. Drop these when it does (review 2026-09-30).
    "RUSTSEC-2026-0194",
    "RUSTSEC-2026-0195",
]

# Treat unmaintained crates as warnings (not errors)
informational_warnings = ["unmaintained"]
