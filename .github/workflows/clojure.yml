name: Clojure Bindings CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'clojure/**'
      - 'java/**'
      - 'pdf_oxide_jni/**'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/clojure.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'clojure/**'
      - 'java/**'
      - 'pdf_oxide_jni/**'
      - 'src/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/clojure.yml'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name != 'release' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Clojure on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6 # v1
        with:
          cache: false
          rustflags: ''

      - name: Cache Cargo build
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-build-release-

      # The Clojure facade has no native code: it calls the Java binding, which
      # owns the single JNI bridge (pdf_oxide_jni crate).
      - name: Build JNI cdylib (release, full feature set)
        run: cargo build --release -p pdf_oxide_jni --features full

      - name: Resolve JNI library path (per OS)
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "macOS" ]; then
            echo "PDF_OXIDE_JNI_LIB=${{ github.workspace }}/target/release/libpdf_oxide_jni.dylib" >> "$GITHUB_ENV"
          else
            echo "PDF_OXIDE_JNI_LIB=${{ github.workspace }}/target/release/libpdf_oxide_jni.so" >> "$GITHUB_ENV"
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Clojure
        uses: DeLaGuardo/setup-clojure@f556541eb28a9303896cee0679ba9f60b898300f # 13.5
        with:
          cli: latest
          clj-kondo: latest

      # Install the Java binding to the local Maven repo so deps.edn resolves
      # `fyi.oxide:pdf-oxide` (skip the dev profile's Rust rebuild + tests).
      - name: Build & install Java binding to local Maven repo
        working-directory: java
        run: mvn -q -B -P'!dev' -DskipTests install

      - name: Lint (clj-kondo)
        working-directory: clojure
        run: clj-kondo --lint src test

      - name: Format check (cljfmt)
        working-directory: clojure
        run: clojure -M:cljfmt check

      - name: Test (api-coverage, JNI lib via fyi.oxide.pdf.lib.path)
        working-directory: clojure
        shell: bash
        run: clojure -J-Dfyi.oxide.pdf.lib.path="${PDF_OXIDE_JNI_LIB}" -M:test

      - name: Run example (with assertion)
        working-directory: clojure
        shell: bash
        run: |
          set -uo pipefail
          OUT="$(clojure -J-Dfyi.oxide.pdf.lib.path="${PDF_OXIDE_JNI_LIB}" -M:example)"
          echo "$OUT"
          echo "$OUT" | grep -q "Hello pdf_oxide" || { echo "::error::example output missing expected text"; exit 1; }

      - name: Run example (html_extraction, with assertion)
        working-directory: clojure
        shell: bash
        run: |
          set -uo pipefail
          OUT="$(clojure -J-Dfyi.oxide.pdf.lib.path="${PDF_OXIDE_JNI_LIB}" -M:example-html)"
          echo "$OUT"
          echo "$OUT" | grep -q "HTML OK" || { echo "::error::html_extraction example failed"; exit 1; }

      - name: Run example (words_geometry, with assertion)
        working-directory: clojure
        shell: bash
        run: |
          set -uo pipefail
          OUT="$(clojure -J-Dfyi.oxide.pdf.lib.path="${PDF_OXIDE_JNI_LIB}" -M:example-words)"
          echo "$OUT"
          echo "$OUT" | grep -q "WORDS OK" || { echo "::error::words_geometry example failed"; exit 1; }

      - name: Run example (tables_extraction, with assertion)
        working-directory: clojure
        shell: bash
        run: |
          set -uo pipefail
          OUT="$(clojure -J-Dfyi.oxide.pdf.lib.path="${PDF_OXIDE_JNI_LIB}" -M:example-tables)"
          echo "$OUT"
          echo "$OUT" | grep -q "TABLES OK" || { echo "::error::tables_extraction example failed"; exit 1; }
