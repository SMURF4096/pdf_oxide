name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel any in-progress run on the same branch when a new one starts.
# Saves minutes on force-pushes; main merges are unaffected (each push gets a unique ref).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Warnings-as-errors for every cargo invocation in this workflow.
  # Clippy + rustdoc are already gated; this closes the gap for
  # `cargo build` / `cargo test` / feature-powerset / FFI / CLI / MCP /
  # maturin / node-gyp cdylib / C# cdylib builds.
  RUSTFLAGS: "-D warnings"

jobs:
  # Check formatting
  fmt:
    name: Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt -- --check

  # Linting with Clippy
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Run Clippy on full workspace
        run: cargo clippy --all-targets --workspace -- -D warnings

  # Build and test
  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        rust: [stable, beta]
        include:
          # Nightly on Ubuntu only - catches upcoming Rust changes
          - os: ubuntu-latest
            rust: nightly
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust }}

      - name: Build
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

      - name: Build documentation (warnings as errors)
        run: cargo doc --no-deps --workspace
        env:
          RUSTDOCFLAGS: "-D warnings"

  # Test Python bindings feature (only production-ready feature in v0.1.0)
  features:
    name: Feature Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        features:
          - ""
          - "python"
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build with features
        run: cargo build --no-default-features --features "${{ matrix.features }}"
        if: matrix.features != ''

      - name: Build without features
        run: cargo build --no-default-features
        if: matrix.features == ''

  # CLI build
  cli:
    name: CLI Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build CLI
        run: cargo build -p pdf_oxide_cli

      - name: Test CLI --help
        run: cargo run -p pdf_oxide_cli -- --help

  # MCP server build
  mcp:
    name: MCP Build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build MCP server
        run: cargo build -p pdf_oxide_mcp

  # Python bindings test
  python:
    name: Python Bindings
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Create virtual environment
        run: uv venv

      - name: Install maturin
        run: uv pip install maturin pytest

      - name: Build Python package
        run: uv run maturin build --release --features python --out dist

      - name: Install wheel
        shell: bash
        run: |
          wheel=$(ls dist/*.whl)
          uv pip install "$wheel"

      - name: Test Python bindings
        run: uv run python -c "import pdf_oxide; print(pdf_oxide.VERSION)"

  # WASM build check
  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          swap-storage: true

      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build WASM
        run: cargo build --lib --target wasm32-unknown-unknown --features wasm

      - name: Clippy WASM
        run: cargo clippy --target wasm32-unknown-unknown --no-default-features --features wasm --lib -- -D warnings

      # SOTA 2026: validate the produced module using wasm-tools
      - name: Install wasm-tools
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-tools

      - name: wasm-tools validate (dev build)
        run: wasm-tools validate target/wasm32-unknown-unknown/debug/pdf_oxide.wasm

      # SOTA 2026: release build + wasm-opt -Oz --converge shrinks the bundle before we ship it
      - name: Install binaryen (wasm-opt)
        run: |
          set -eux
          ver="120"
          curl -fL -o binaryen.tar.gz "https://github.com/WebAssembly/binaryen/releases/download/version_${ver}/binaryen-version_${ver}-x86_64-linux.tar.gz"
          tar -xzf binaryen.tar.gz
          echo "$PWD/binaryen-version_${ver}/bin" >> "$GITHUB_PATH"

      - name: Release WASM build
        run: cargo build --release --lib --target wasm32-unknown-unknown --no-default-features --features wasm

      - name: wasm-opt -Oz --converge (size gate)
        shell: bash
        run: |
          in="target/wasm32-unknown-unknown/release/pdf_oxide.wasm"
          out="target/wasm32-unknown-unknown/release/pdf_oxide.opt.wasm"
          # Rustc emits several post-MVP features for wasm32 — enable each
          # explicitly or wasm-opt's validator rejects the input module.
          wasm-opt -Oz --converge \
            --enable-nontrapping-float-to-int \
            --enable-bulk-memory \
            --enable-sign-ext \
            --enable-mutable-globals \
            --enable-reference-types \
            "$in" -o "$out"
          before_kb=$(( $(stat -c%s "$in") / 1024 ))
          after_kb=$(( $(stat -c%s "$out") / 1024 ))
          echo "Before wasm-opt: ${before_kb} KB"
          echo "After  wasm-opt: ${after_kb} KB"
          # Size regression gate: current baseline after -Oz is ~7.8 MB.
          # Leave ~20% headroom; tighten after a dedicated size-reduction pass.
          max_kb=9216
          if [ "$after_kb" -gt "$max_kb" ]; then
            echo "::error::wasm bundle ${after_kb} KB exceeds ceiling ${max_kb} KB"
            exit 1
          fi
          wasm-tools validate "$out"

  # C FFI layer build check - the shared library that Go, JS, and C# bindings link against
  ffi-build:
    name: FFI Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ffi-${{ matrix.os }}

      - name: Build library (produces cdylib + rlib)
        run: cargo build --release --lib

  # Go bindings build and test
  go:
    name: Go Bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.22'

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: go-${{ matrix.os }}

      # Windows uses a GNU Rust target so the resulting `libpdf_oxide.a`
      # is MinGW-compatible with the gcc linker that Go's CGo invokes by
      # default. The MSVC target produces `pdf_oxide.lib` (COFF) which
      # MinGW ld can't read, matching the release.yml cross-compile row
      # (#334).
      - name: Windows — add GNU Rust target
        if: matrix.os == 'windows-latest'
        run: rustup target add x86_64-pc-windows-gnu

      - name: Build library (cdylib + rlib + staticlib)
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            windows-latest)
              cargo build --release --lib --target x86_64-pc-windows-gnu
              ;;
            macos-latest)
              cargo build --release --lib --target aarch64-apple-darwin
              ;;
            *)
              cargo build --release --lib
              ;;
          esac

      - name: Go build
        working-directory: go
        run: go build -tags pdf_oxide_dev ./...

      - name: Go vet
        working-directory: go
        run: go vet -tags pdf_oxide_dev ./...

      - name: Go format check
        working-directory: go
        shell: bash
        run: |
          diff=$(gofmt -l .)
          if [ -n "$diff" ]; then
            echo "The following Go files need formatting:"
            echo "$diff"
            echo
            echo "Run 'gofmt -w .' to fix."
            exit 1
          fi

      # SOTA 2026: golangci-lint v2 (single meta-linter replacing many)
      - name: golangci-lint
        if: matrix.os == 'ubuntu-latest'
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: go
          args: --build-tags pdf_oxide_dev --timeout 5m

      # SOTA 2026: govulncheck — module-level vulnerability scanner
      - name: govulncheck
        if: matrix.os == 'ubuntu-latest'
        working-directory: go
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck -tags pdf_oxide_dev ./...

      # SOTA 2026: race detector catches data races that survive linting
      - name: Go test -race
        working-directory: go
        run: go test -race -count=1 -p 1 -tags pdf_oxide_dev ./...

  # JavaScript/TypeScript bindings build and test
  # Mirrors the release.yml build-nodejs job: builds the Rust staticlib, then
  # runs node-gyp rebuild to produce a real .node addon, matching exactly what
  # ships to npm.
  nodejs:
    name: Node.js Bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: nodejs-${{ matrix.os }}

      - name: Build library (produces cdylib + rlib + staticlib)
        run: cargo build --release --lib

      - name: Stage staticlib for node-gyp
        shell: bash
        run: |
          mkdir -p lib
          case "${{ matrix.os }}" in
            ubuntu-latest)
              cp target/release/libpdf_oxide.a lib/
              ;;
            macos-latest)
              cp target/release/libpdf_oxide.a lib/
              ;;
            windows-latest)
              cp target/release/pdf_oxide.lib lib/
              ;;
          esac

      - name: Install dependencies
        working-directory: js
        run: npm install --ignore-scripts

      - name: TypeScript type check
        working-directory: js
        run: npx tsc --noEmit

      # SOTA 2026: Biome v2 replaces eslint+prettier (one tool, Rust-core, ~10× faster)
      - name: Biome lint+format check
        if: matrix.os == 'ubuntu-latest'
        working-directory: js
        run: npx --yes @biomejs/biome@latest ci .

      # SOTA 2026: publint — validates package.json so the published tarball works in every module system
      - name: publint
        if: matrix.os == 'ubuntu-latest'
        working-directory: js
        run: npx --yes publint

      # SOTA 2026: @arethetypeswrong/cli — checks that types resolve for every exports condition
      - name: arethetypeswrong (types vs runtime)
        if: matrix.os == 'ubuntu-latest'
        working-directory: js
        run: npx --yes @arethetypeswrong/cli --pack . --ignore-rules=cjs-resolves-to-esm

      # SOTA 2026: npm audit fails on high+ severity transitive vulns
      - name: npm audit (prod deps, high severity)
        if: matrix.os == 'ubuntu-latest'
        working-directory: js
        run: npm audit --omit=dev --audit-level=high

      - name: Build native addon with node-gyp
        working-directory: js
        shell: bash
        run: |
          npx node-gyp rebuild
          ls -la build/Release/pdf_oxide.node

  # C#/.NET bindings build
  csharp:
    name: C# Bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Cache
        uses: Swatinem/rust-cache@v2
        with:
          key: csharp-${{ matrix.os }}

      - name: Build library (produces cdylib + rlib)
        run: cargo build --release --lib

      - name: Build C# library
        working-directory: csharp/PdfOxide
        run: dotnet build -c Release -p:TreatWarningsAsErrors=true

      - name: Build C# tests
        working-directory: csharp/PdfOxide.Tests
        run: dotnet build -c Release -p:TreatWarningsAsErrors=true

      # SOTA 2026: dotnet format verifies whitespace + style conformance without mutating files
      - name: dotnet format --verify-no-changes
        if: matrix.os == 'ubuntu-latest'
        working-directory: csharp
        run: dotnet format PdfOxide/PdfOxide.csproj --verify-no-changes --severity warn

      - name: dotnet format tests --verify-no-changes
        if: matrix.os == 'ubuntu-latest'
        working-directory: csharp
        run: dotnet format PdfOxide.Tests/PdfOxide.Tests.csproj --verify-no-changes --severity warn

      # SOTA 2026: dotnet list package --vulnerable surfaces known CVE in transitive NuGet deps
      - name: dotnet list package --vulnerable (PdfOxide)
        if: matrix.os == 'ubuntu-latest'
        working-directory: csharp/PdfOxide
        shell: bash
        run: |
          output=$(dotnet list package --vulnerable --include-transitive 2>&1)
          echo "$output"
          # Exit non-zero if any vulnerabilities are reported
          if echo "$output" | grep -qi "has the following vulnerable packages"; then
            echo "::error::Vulnerable NuGet packages detected in PdfOxide"
            exit 1
          fi

      - name: dotnet list package --vulnerable (PdfOxide.Tests)
        if: matrix.os == 'ubuntu-latest'
        working-directory: csharp/PdfOxide.Tests
        shell: bash
        run: |
          output=$(dotnet list package --vulnerable --include-transitive 2>&1)
          echo "$output"
          if echo "$output" | grep -qi "has the following vulnerable packages"; then
            echo "::error::Vulnerable NuGet packages detected in PdfOxide.Tests"
            exit 1
          fi

      - name: Stage native lib for C# tests
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest)
              cp target/release/libpdf_oxide.so csharp/PdfOxide.Tests/bin/Release/net8.0/
              ;;
            macos-latest)
              cp target/release/libpdf_oxide.dylib csharp/PdfOxide.Tests/bin/Release/net8.0/
              ;;
            windows-latest)
              cp target/release/pdf_oxide.dll csharp/PdfOxide.Tests/bin/Release/net8.0/
              ;;
          esac

      - name: Run C# tests
        working-directory: csharp/PdfOxide.Tests
        run: dotnet test -c Release --no-build --verbosity normal

  # Code coverage with enforcement
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Generate coverage
        run: |
          cargo llvm-cov --lib --tests --lcov --output-path lcov.info \
            --ignore-filename-regex '(cid_mappings/|adobe_glyph_list\.rs|python\.rs|wasm\.rs|ffi\.rs|ocr/|rendering/|bin/)'

      - name: Enforce 85% coverage threshold
        run: |
          cargo llvm-cov report \
            --ignore-filename-regex '(cid_mappings/|adobe_glyph_list\.rs|python\.rs|wasm\.rs|ffi\.rs|ocr/|rendering/|bin/)' \
            --fail-under-lines 85

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: ./lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  # Benchmark smoke test
  bench:
    name: Benchmark Smoke Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build benchmarks
        run: cargo bench --no-run

  # Security audit
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run security audit
        uses: actions-rust-lang/audit@v1

  # cargo-deny: licenses / advisories / bans / sources (single consolidated gate)
  deny:
    name: Dependency Check (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Check dependencies
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  # TOML formatting check (taplo)
  taplo:
    name: TOML format (taplo)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: taplo
      - name: Install taplo
        uses: taiki-e/install-action@v2
        with:
          tool: taplo-cli
      - name: Check TOML formatting
        run: taplo fmt --check

  # Unused dependencies check (cargo-shear)
  shear:
    name: Unused deps (cargo-shear)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: shear
      - name: Install cargo-shear
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-shear
      - name: Check for unused dependencies
        run: cargo shear

  # Feature powerset: build with every combination of features to catch cfg-rot
  # Only runs on ubuntu to contain cost; skips dev-dependencies.
  features-powerset:
    name: Feature powerset (cargo-hack)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: hack
      - name: Install cargo-hack
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-hack
      - name: Build every feature combination (root crate)
        run: cargo hack check --feature-powerset --no-dev-deps --lib

  # Public-API semver check (PR only — compares against base branch)
  semver-checks:
    name: Semver check (PR only)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - uses: obi1kenobi/cargo-semver-checks-action@v2
        with:
          feature-group: default-features

  # MSRV: verify the oldest supported Rust toolchain still builds the library
  msrv:
    name: MSRV build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          v=$(grep -E '^rust-version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${v:-1.82}" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv
      - name: Build with MSRV toolchain
        run: cargo build --lib --all-features
